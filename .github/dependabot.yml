version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"         # Location of go.mod (use "/" for root)
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "albanemerian"
      - "marinlamy"
      - "Matisse-M"
      - "noaroussiere"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore"
      include: "scope"
