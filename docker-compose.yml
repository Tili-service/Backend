services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_PORT=${POSTGRES_PORT}
    volumes:
      - ./database/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./database/schemas/tables:/docker-entrypoint-initdb.d/tables
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend

  backend:
    build: ./app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - STRIPE_PRICE_MENSUEL=${STRIPE_PRICE_MENSUEL}
      - STRIPE_PRICE_SEMESTRIEL=${STRIPE_PRICE_SEMESTRIEL}
      - STRIPE_PRICE_ANNUEL=${STRIPE_PRICE_ANNUEL}
      - APP_URL=${APP_URL}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - BACKEND_PORT=${BACKEND_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:

volumes:
  pgdata:
