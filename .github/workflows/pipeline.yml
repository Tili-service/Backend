# Backend pipeline for CI/CD

name: Backend Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-coding-style:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: run coding style checker
        run : |
          ./scripts/go_coding_style_checker.sh
          if [ -s ./scripts/gofmt_output.txt ]; then
            cat ./scripts/gofmt_output.txt | while read line; do
              echo "::error file=$line::"
            done
            exit 1
          else
            exit 0
          fi
