# Backend pipeline for CI/CD

name: Backend Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

    jobs:
      check-coding-style:
        runs-on: ubuntu-latest
        steps:
          - name: checkout code
            uses: actions/checkout@v4

          - name: run coding style checker
            run : |
              ./scripts/go_coding_style_checker.sh
